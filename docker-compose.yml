services:
  webhook-gateway:
    build: .
    image: webhook-gateway:latest
    container_name: webhook-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FEISHU_WEBHOOK_URL: "${FEISHU_WEBHOOK_URL}"
      FEISHU_SECRET: "${FEISHU_SECRET:-}"
      GATEWAY_TOKEN: "${GATEWAY_TOKEN:-change-me}"
      HOST: "0.0.0.0"
      PORT: "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
